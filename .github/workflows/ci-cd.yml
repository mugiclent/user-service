name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/katisha-user-service

jobs:
  # ── 1. Quality checks ────────────────────────────────────────────────────────
  checks:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ tests/

      - name: Unit tests
        run: npx vitest run

  # ── 2. Build & push image ────────────────────────────────────────────────────
  # Runs only on pushes to main (not on PRs)
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tags
        id: meta
        run: |
          SHA_TAG=sha-${{ github.sha }}
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${SHA_TAG}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tag with both the immutable SHA and `latest` so the server can
          # always pull the newest image with a single `docker compose pull`
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_TAG
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            # Write the new image tag into the env file so docker compose picks it up
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}/" .env
            # Append if not present yet (first deploy)
            grep -q "^IMAGE_TAG=" .env || echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" >> .env

            # Pull the new image and recreate the container
            docker compose pull user-service
            docker compose up -d --no-deps user-service

            # Remove dangling images to keep the server clean
            docker image prune -f
